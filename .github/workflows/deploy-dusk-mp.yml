name: Deploy dusk-mp worker

# Deploys the multiplayer worker (worker/) to Cloudflare.
# One-time setup (all doable from the GitHub app on iPhone):
#   1. Create a Cloudflare API token: dash.cloudflare.com > My Profile >
#      API Tokens > Create Token > template "Edit Cloudflare Workers" > Create > copy.
#   2. Repo > Settings > Secrets and variables > Actions > New repository secret:
#        name  CLOUDFLARE_API_TOKEN     value <the token>
#      (Optional, only if the deploy log asks for it:)
#        name  CLOUDFLARE_ACCOUNT_ID    value <your account id>
#   3. Actions tab > this workflow > Run workflow.
# The run log prints the worker URL, e.g. https://dusk-mp.<subdomain>.workers.dev

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-dusk-mp.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          wranglerVersion: '3.114.17'
          command: deploy
