name: Deploy dusk site worker

# Replaces the old frozen HTML snapshot at https://dusk.<subdomain>.workers.dev
# with a proxy that mirrors the live GitHub Pages build. Uses the same
# CLOUDFLARE_API_TOKEN secret as the dusk-mp deploy.

on:
  push:
    branches: [main]
    paths:
      - 'worker-site/**'
      - '.github/workflows/deploy-dusk-site.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker-site
          wranglerVersion: '3.114.17'
          command: deploy
