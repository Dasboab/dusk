<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DUSK">
  <meta name="theme-color" content="#0d0a16">
  <title>DUSK v0.4</title>
  <style>
    html,body{margin:0;height:100%;background:#0d0a16;color:#e9dfcf;font-family:system-ui,-apple-system,sans-serif;overflow:hidden;touch-action:manipulation}
    #fallback{position:fixed;inset:0;display:grid;place-items:center;text-align:center;padding:24px;z-index:1}
    a{color:#ffb454;font-weight:700}
  </style>
</head>
<body>
  <div id="fallback">
    <main>
      <h1>DUSK</h1>
      <p>Loading v0.4 native mobile build…</p>
      <p><a href="./dusk_index_fixed.html">Open unpatched fallback</a></p>
    </main>
  </div>
  <script>
    (async function(){
      const fallback=document.getElementById('fallback');
      try{
        const html=await fetch('./dusk_index_fixed.html?base=4',{cache:'no-store'}).then(r=>{
          if(!r.ok) throw new Error('Base game failed to load: '+r.status);
          return r.text();
        });
        const patches = '\n<script src="./v02_patch.js?b=5"><\\/script>' +
                        '\n<script src="./v03_patch.js?b=3"><\\/script>' +
                        '\n<script src="./v04_patch.js?b=2"><\\/script>';
        const patched = html.includes('</body>') ? html.replace('</body>', patches+'\n</body>') : html + patches;
        document.open();
        document.write(patched);
        document.close();
      }catch(err){
        console.error(err);
        fallback.innerHTML='<main><h1>DUSK</h1><p>Could not load patched build.</p><p><a href="./dusk_index_fixed.html">Open fallback</a></p></main>';
      }
    })();
  </script>
</body>
</html>
