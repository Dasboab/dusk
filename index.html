<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="DUSK">
  <meta name="theme-color" content="#0d0a16">
  <title>DUSK v0.4</title>
  <style>
    html,body{margin:0;height:100%;background:#0d0a16;color:#e9dfcf;font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#0d0a16}
    #fallback{position:fixed;inset:0;display:grid;place-items:center;text-align:center;padding:24px;z-index:1}
    a{color:#ffb454;font-weight:700}
  </style>
</head>
<body>
  <div id="fallback">
    <main>
      <h1>DUSK</h1>
      <p>Loading v0.4 expanded tactical prototype…</p>
      <p><a href="./dusk_index_fixed.html">Open unpatched fallback</a></p>
    </main>
  </div>
  <iframe id="gameframe" src="./dusk_index_fixed.html" allow="fullscreen" title="DUSK"></iframe>
  <script>
    const frame=document.getElementById('gameframe');
    frame.addEventListener('load',()=>{
      document.getElementById('fallback').style.display='none';
      const doc=frame.contentDocument;
      function inject(src,label){
        return new Promise((resolve,reject)=>{
          const s=doc.createElement('script');
          s.src=src;
          s.onload=resolve;
          s.onerror=()=>{console.error(label+' failed to load');reject(new Error(label+' failed to load'));};
          doc.body.appendChild(s);
        });
      }
      inject('./v02_patch.js?b=4','DUSK v0.2 patch')
        .then(()=>inject('./v03_patch.js?b=2','DUSK v0.3 patch'))
        .then(()=>inject('./v04_patch.js?b=1','DUSK v0.4 patch'))
        .catch(err=>console.error(err));
    });
  </script>
</body>
</html>
